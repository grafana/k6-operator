---
name: Prepare release
permissions: {}
run-name: Prepare release ${{ inputs.operator_version }}

on:
  workflow_dispatch:
    inputs:
      operator_version:
        description: "Operator version to release, for example v1.5.0."
        required: true
        type: string
      chart_version:
        description: "Helm chart version to release, for example 4.5.0."
        required: true
        type: string

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # to push the branch
      issues: write # to label the PR
      pull-requests: write # to open the PR

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true # this job opens a release-prep PR
          fetch-depth: 0

      - name: Set release variables
        env:
          OPERATOR_VERSION: ${{ inputs.operator_version }}
          CHART_VERSION: ${{ inputs.chart_version }}
        run: ./hack/release/check-prepare-preconditions.sh

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Prepare release files
        run: |
          make release-prepare \
            OPERATOR_VERSION="${OPERATOR_VERSION}" \
            CHART_VERSION="${CHART_VERSION}"

      - name: Validate release files
        run: ./hack/release/validate-release.sh

      - name: Open release-prep PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./hack/release/open-release-pr.sh
