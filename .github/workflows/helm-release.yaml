name: Helm release
permissions: {}

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "charts/k6-operator/Chart.yaml"

jobs:
  decide:
    runs-on: ubuntu-x64
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.classify.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      # There can be two types of Helm releases:
      # 1. part of regular k6-operator release
      # 2. ad-hoc release, done separately
      # The 1st type is triggered twice: on merge of PR (this must be skipped
      # because images don't exist yet) and on `workflow_dispatch` from finalize-release
      # (this one should be published).
      # The 2nd type must also be published.
      # The decide / classify step handles this conditional logic.
      - name: Classify release
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          if [[ "$EVENT_NAME" != "push" ]]; then
            echo "Event ${EVENT_NAME}; publishing."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git rev-parse --quiet --verify "${PUSH_BEFORE}^{commit}" > /dev/null; then
            echo "::error::Base commit ${PUSH_BEFORE} unavailable; refusing to classify automatically." >&2
            exit 1
          fi
          # An operator release bumps appVersion (the operator image the chart
          # deploys); an ad-hoc chart release bumps only `version:`. So a changed
          # appVersion line marks the operator-release push, whose images don't
          # exist yet -- finalize-release will dispatch the Helm release later.
          if git diff "$PUSH_BEFORE" "$PUSH_AFTER" -- charts/k6-operator/Chart.yaml \
               | grep -qE '^[+-]appVersion:'; then
            echo "Operator release push; finalize-release will dispatch the Helm release once images exist. Skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Chart-only push; publishing."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  generate-chart-schema:
    needs: decide
    if: needs.decide.outputs.should_publish == 'true'
    runs-on: ubuntu-x64
    permissions:
      contents: write # to push a branch if needed
      pull-requests: write # to open a PR if needed

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: true # this job is opening a PR in the next steps

      - name: Make changes to the file
        run: |
          make helm-schema

      - name: Git diff
        id: git-diff
        continue-on-error: true
        run: |
          if git diff --exit-code; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Commit changes and make PR"
        if: steps.git-diff.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sign-commits: true
          branch: helm/schema-update
          base: main
          add-paths: charts/k6-operator/values.schema.json
          commit-message: "auto: generate schema json"
          title: "Helm schema update"
          body: "Auto-generated by Github Workflow"

      # Fail so a maintainer reviews and merges the schema PR, then re-runs the
      # Helm release.
      - name: Require schema PR review
        if: steps.git-diff.outputs.changes == 'true'
        run: |
          echo "Review the PR with schema update and re-run Helm release."
          exit 1

  call-update-helm-repo:
    if: needs.decide.outputs.should_publish == 'true'
    permissions:
      packages: write # to publish release package
      id-token: write # auth
      contents: write # to publish tag and release
    needs:
      - decide
      - generate-chart-schema
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@8ac07d41b2fa02ca16dc0fc084d8f145cb690988
    with:
      charts_dir: charts
      cr_configfile: charts/cr.yaml
      ct_configfile: charts/ct.yaml
      helm_tag_prefix: helm
      github_app: k6-operator-helm-release-app
