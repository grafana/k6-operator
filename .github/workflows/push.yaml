---
name: "Publish k6-operator images"
permissions: {}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag name for a manual image build."
        required: true
      promote_latest:
        description: "Also update latest, latest-runner, and latest-starter."
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: "Build images"
    runs-on: ubuntu-x64
    permissions:
      contents: read
      packages: write
    steps:
      - name: "Build:checkout"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: "Set image tag name"
        env:
          GH_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          echo "IMAGETAG=${GH_IMAGE_TAG}" >> "$GITHUB_ENV"
      - name: "Check image tag name"
        run: |
          echo "IMAGETAG=${IMAGETAG}"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@f4e8deed0c3c26542279f4042c0e1d059cbf012d
      - name: "Build:buildx"
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3
        with:
          cache-binary: false
          version: v0.31.1 # Buildx version
      - name: "Build:login"
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "Build:dockerimage"
        id: build-controller
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          push: true
          file: Dockerfile.controller
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/grafana/k6-operator:controller-${{env.IMAGETAG}}
      - name: "Build:dockerimage"
        id: build-runner
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          push: true
          file: Dockerfile.runner
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/grafana/k6-operator:runner-${{env.IMAGETAG}}
      - name: "Build:dockerimage"
        id: build-starter
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          push: true
          file: Dockerfile.starter
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/grafana/k6-operator:starter-${{env.IMAGETAG}}
      - name: "Promote latest tags"
        if: ${{ inputs.promote_latest }}
        run: |
          ./hack/release/promote-latest-tags.sh \
            "ghcr.io/grafana/k6-operator:controller-${IMAGETAG}@${{ steps.build-controller.outputs.digest }}" \
            "ghcr.io/grafana/k6-operator:runner-${IMAGETAG}@${{ steps.build-runner.outputs.digest }}" \
            "ghcr.io/grafana/k6-operator:starter-${IMAGETAG}@${{ steps.build-starter.outputs.digest }}"
