---
name: "Smoke test for TestRun CRD"
permissions: {}
on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "config/**"
      - "charts/**"
  workflow_dispatch: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      go-or-manifests: ${{ steps.filter.outputs.go-or-manifests }}
      charts: ${{ steps.filter.outputs.charts }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Detect changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            go-or-manifests:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'config/**'
            charts:
              - 'charts/**'

  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: "Build:checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: "Build:buildx"
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3
        with:
          cache-binary: false
          version: v0.31.1 # Buildx version
      - name: "Build:login"
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "Build:dockerimage"
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          file: Dockerfile.controller
          push: true
          build-args: |
            GO_BUILDER_IMG=golang:1.26
          tags: |
            ghcr.io/grafana/k6-operator:${{ github.sha }}

  kind-kustomize:
    needs: ["changes", "docker"]
    if: needs.changes.outputs.go-or-manifests == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: "Setup kustomize"
        # this is v2.1.0
        uses: imranismail/setup-kustomize@ab2f6c276a92396da9967066f67ef300563038cf

      - name: "Kustomize Build"
        run: |
          cd config/default && kustomize build . > ../../rendered.yaml

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          node_image: "kindest/node:v1.35.1"

      - name: Test
        run: |
          kubectl cluster-info
          kubectl cluster-info dump | grep 'nodeInfo' -A 11
          kubectl apply -f rendered.yaml
          kubectl -n k6-operator-system set image deployment/k6-operator-controller-manager manager=ghcr.io/grafana/k6-operator:${{ github.sha }}
          kubectl -n k6-operator-system describe deployment k6-operator-controller-manager
          kubectl create configmap crocodile-stress-test --from-file e2e/test.js
          kubectl apply -f e2e/test.yaml
          kubectl wait --for=create --timeout=60s job/k6-sample-1
          kubectl wait --for=condition=complete --timeout=180s job/k6-sample-initializer
          kubectl delete configmap crocodile-stress-test
          kubectl delete -f e2e/test.yaml

  kind-helm:
    needs: ["changes", "docker"]
    if: needs.changes.outputs.charts == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        # this is v4.3.0
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112
        with:
          version: v3.7.2

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          node_image: "kindest/node:v1.35.1"

      - name: Testing
        run: |
          helm install k6-operator ./charts/k6-operator/ -f ./charts/k6-operator/values.yaml --set manager.image.tag=${{github.sha}}
          kubectl cluster-info dump | grep 'nodeInfo' -A 11
          kubectl -n k6-operator-system describe deployment k6-operator-controller-manager
          kubectl create configmap crocodile-stress-test --from-file e2e/test.js
          kubectl apply -f e2e/test.yaml
          kubectl wait --for=create --timeout=60s job/k6-sample-1
          kubectl wait --for=condition=complete --timeout=180s job/k6-sample-1
          kubectl delete configmap crocodile-stress-test
          kubectl delete -f e2e/test.yaml
